<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome Email</title>
       <style>
         body {
            margin: 0;
            padding: 40px 20px;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
            color: #cdd6f4;
        }
        .container {
          max-width: 600px;
          margin: 0 auto;
          background-color: #1e2033;
          border-radius: 12px;
          padding: 40px;
        }
        .greeting {
          font-size: 24px;
          font-weight: bold;
          margin-bottom: 12px;
          color: #ffffff;
        }
        .greeting span {
          color: #cba6f7;
        }
        .subtitle {
          font-size: 15px;
          color: #a6adc8;
          line-height: 1.6;
          margin-bottom: 32px;
        }
        .card {
          background-color: #252640;
          border-radius: 10px;
          padding: 24px;
        }
        .card-title {
          font-size: 11px;
          font-weight: bold;
          letter-spacing: 2px;
          color: #89b4fa;
          margin-bottom: 20px;
          text-transform: uppercase;
        }
        .detail-row {
          display: flex;
          align-items: center;
          padding: 14px 0;
          border-bottom: 1px solid #313244;
        }
        .detail-row:last-child {
          border-bottom: none;
        }
        .icon {
          width: 40px;
          height: 40px;
          background-color: #313244;
          border-radius: 8px;
          display: flex;
          align-items: center;
          justify-content: center;
          margin-right: 16px;
          font-size: 18px;
          flex-shrink: 0;
        }
        .detail-label {
          font-size: 11px;
          letter-spacing: 1px;
          color: #a6adc8;
          text-transform: uppercase;
          margin-bottom: 4px;
        }
        .detail-value {
          font-size: 15px;
          font-weight: bold;
          color: #cdd6f4;
        }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="greeting">Hi, <span>{{FullName}}</span> 👋</div>
        <p class="subtitle">
          Thank you for registering. Your account has been successfully created and is ready to use.
        </p>
        <div class="card">
          <div class="card-title">Account Details</div>
          <div class="detail-row">
            <div class="icon">👤</div>
            <div>
              <div class="detail-label">Username</div>
              <div class="detail-value">{{Username}}</div>
            </div>
          </div>
         <div class="detail-row">
           <div class="icon">✉️</div>
           <div>
             <div class="detail-label">Email</div>
             <div class="detail-value">{{Email}}</div>
           </div>
         </div>
       </div>
     </div>
   </body>
   </html>
